<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorio Links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: black;
        }
        a:hover{
            color: green;
            text-decoration: underline;
            
        }
        a:active{
            color: blue;
        }
        a::before{
            content: '';
        }
        a::after{
            content: '';
        }
        
    </style>
</head>
<body>
    <h1>Personalizar Links</h1>
    <ul>
        <a href="https://gustavoguanabara.github.io" target="_blank">
            <li>GitHub</li>
        </a>
        <a href="https://youtube.com/cursoemvideo/" target="_blank">
            <li>Youtube</li>
        </a>
        <a href="https://www.cursoemvideo.com" target="_blank">
            <li>Site Cursoemvideo</li>
        </a>
    </ul>
</body>
</html>
