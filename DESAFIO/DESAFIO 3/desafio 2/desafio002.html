<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Desafio 002</title>

        }

        caption {

        table {

        }

        td {
            border: 1px solid black;

        <thead>
            <tr>

            </tr>
            <tr>
                <td rowspan="4">C</td>
                <td>D</td>
                <td>E</td>
                <td>F</td>
            </tr>
            <tr>
                <td>G</td>
                <td>H</td>
                <td>I</td>
            </tr>
            <tr>
                <td>J</td>
                <td>L</td>
                <td>M</td>
            </tr>
            <tr>
                <td colspan="4">N</td>
            </tr>
        </thead>
    </table>
</body>
</html>
