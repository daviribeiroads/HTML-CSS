<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
        div > p{
            display: none;
        }
        div:hover > p{
            display: block;
        }
       
    </style>
</head>
<body>
    <h1>Exemplo de hover</h1>
    <p>Passe o mouse sobre o texto abaixo</p>
    <div>
        Serviço
        <hr>
        <p>face</p>
        <p>youtube</p>
        <p>google</p>
        <p>Muda de texto</p>
        
    </div>
    <P>Fim do texto...</P>
</body>
</html>
